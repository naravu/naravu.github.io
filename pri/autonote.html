<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>data:text/html, <html contenteditable></html></title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --header-bg: #ffffff;
            --text-color: #333;
            --editor-bg: #ffffff;
            --border-color: #ddd;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg-color: #121212;
            --header-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --editor-bg: #1e1e1e;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }

        #controls {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 100;
        }

        #editor {
            width: 100%;
            max-width: 900px;
            min-height: 85vh;
            margin: 80px auto;
            padding: 30px;
            outline: none;
            background: var(--editor-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            line-height: 1.6;
            white-space: pre-wrap;
            border-radius: 8px;
        }

        button {
            padding: 8px 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        button.secondary { background: #6c757d; }
        button.success { background: #28a745; }
        button:hover { opacity: 0.9; }

        #status {
            font-size: 12px;
            color: #888;
            min-width: 150px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button class="success" onclick="downloadFile()">Download .txt</button>
        <button class="secondary" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        <div id="status">Last saved: Never</div>
    </div>

    <!-- Spellcheck enabled here -->
    <div id="editor" contenteditable="true" spellcheck="true">Start typing... data:text/html, <html contenteditable></html></div>

    <script>
        const editor = document.getElementById('editor');
        const status = document.getElementById('status');

        // 1. Initial Load (Content + Theme)
        window.onload = () => {
            // Load Content
            const savedData = localStorage.getItem('notepad-content');
            if (savedData) editor.innerText = savedData;

            // Load Theme Preference
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
        };

        // 2. Autosave on input
        editor.addEventListener('input', () => {
            localStorage.setItem('notepad-content', editor.innerText);
            const now = new Date();
            status.innerText = `Last saved: ${now.toLocaleTimeString()}`;
        });

        // 3. Dark Mode Toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // 4. Download logic
        function downloadFile() {
            const text = editor.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = 'notes.txt';
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
            window.URL.revokeObjectURL(anchor.href);
        }
    </script>
</body>
</html>
