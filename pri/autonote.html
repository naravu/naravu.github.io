<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonote</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --header-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1a1a1a;
            --editor-bg: #ffffff;
            --accent-color: #6366f1;
            --border-color: #e5e7eb;
        }

        body.dark-mode {
            --bg-color: #0f172a;
            --header-bg: rgba(30, 41, 59, 0.8);
            --text-color: #f1f5f9;
            --editor-bg: #1e293b;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsive Glassmorphism Header */
        #controls {
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(10px);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 10px;
            gap: 8px;
            z-index: 1000;
        }

        /* The Writing Area */
        #editor {
            width: 90%;
            max-width: 800px;
            min-height: 80vh;
            margin-top: 120px; /* Space for wrap-around header on mobile */
            margin-bottom: 40px;
            padding: 40px;
            outline: none;
            background: var(--editor-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            font-size: 18px;
            line-height: 1.8;
            word-wrap: break-word;
        }

        /* Buttons & Inputs */
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, opacity 0.2s;
            background: var(--accent-color);
            color: white;
        }

        .btn:active { transform: scale(0.95); }
        
        .format-btn {
            background: var(--border-color);
            color: var(--text-color);
            font-family: serif;
            width: 35px;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }

        #status {
            font-size: 11px;
            opacity: 0.6;
            width: 100%;
            text-align: center;
            margin-top: 5px;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            #editor {
                padding: 20px;
                margin-top: 140px;
                font-size: 16px;
            }
            .format-btn { display: none; } /* Hide formatting on tiny screens to save space */
        }
    </style>
</head>
<body>

    <div id="controls">
        <!-- Action Buttons -->
        <button class="btn" onclick="downloadFile()" title="Download">💾</button>
        <button class="btn" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
        
        <!-- Color Picker -->
        <input type="color" id="colorPicker" value="#6366f1" oninput="changeAccent(this.value)">

        <!-- Rich Text Controls -->
        <button class="btn format-btn" onclick="execCmd('bold')"><b>B</b></button>
        <button class="btn format-btn" onclick="execCmd('italic')"><i>I</i></button>
        <button class="btn format-btn" onclick="execCmd('insertUnorderedList')">•</button>

        <div id="status">Waiting for input...</div>
    </div>

    <div id="editor" contenteditable="true" spellcheck="true">
        Write your masterpiece here...
    </div>

    <script>
        const editor = document.getElementById('editor');
        const status = document.getElementById('status');

        // Execute Rich Text Commands
        function execCmd(command) {
            document.execCommand(command, false, null);
            editor.focus();
        }

        // Change Accent Color
        function changeAccent(color) {
            document.documentElement.style.setProperty('--accent-color', color);
            localStorage.setItem('accent-color', color);
        }

        // Dark Mode Toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Initial Load
        window.onload = () => {
            // Load Content
            const savedData = localStorage.getItem('zen-content');
            if (savedData) editor.innerHTML = savedData;

            // Load Theme
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerText = '☀️';
            }

            // Load Accent
            const savedAccent = localStorage.getItem('accent-color');
            if (savedAccent) {
                changeAccent(savedAccent);
                document.getElementById('colorPicker').value = savedAccent;
            }
        };

        // Autosave logic
        editor.addEventListener('input', () => {
            localStorage.setItem('zen-content', editor.innerHTML);
            const now = new Date();
            status.innerText = `Auto-saved @ ${now.toLocaleTimeString()} | Chars: ${editor.innerText.length}`;
        });

        // Download logic (handles HTML to maintain formatting if needed, or Plain Text)
        function downloadFile() {
            const text = editor.innerText; 
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = `note-${new Date().toISOString().slice(0,10)}.txt`;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }
    </script>
</body>
</html>
