<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Optimized Editor</title>
</head>
<body id="body" style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; transition: background-color 0.3s; display: flex; flex-direction: column; align-items: center;">

    <!-- Fixed Toolbar -->
    <div id="controls" style="position: sticky; top: 0; width: 100%; background: #ffffff; border-bottom: 1px solid #ddd; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 10px; gap: 8px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <!-- Action Group -->
        <div style="display: flex; gap: 5px; align-items: center; border-right: 1px solid #eee; padding-right: 10px;">
            <button onclick="downloadFile()" style="padding: 8px 12px; border: none; border-radius: 6px; background: #28a745; color: white; cursor: pointer; font-size: 16px;">📥</button>
            <button id="themeBtn" onclick="toggleDarkMode()" style="padding: 8px 12px; border: none; border-radius: 6px; background: #6c757d; color: white; cursor: pointer; font-size: 16px;">🌙</button>
        </div>

        <!-- Format Group (Visible on all screens) -->
        <div style="display: flex; gap: 5px; align-items: center;">
            <button onclick="execCmd('bold')" style="width: 35px; height: 35px; border: 1px solid #ddd; border-radius: 4px; background: #fff; font-weight: bold; cursor: pointer;">B</button>
            <button onclick="execCmd('italic')" style="width: 35px; height: 35px; border: 1px solid #ddd; border-radius: 4px; background: #fff; font-style: italic; cursor: pointer;">I</button>
            <button onclick="execCmd('underline')" style="width: 35px; height: 35px; border: 1px solid #ddd; border-radius: 4px; background: #fff; text-decoration: underline; cursor: pointer;">U</button>
            <input type="color" id="colorPicker" oninput="changeAccent(this.value)" style="width: 30px; height: 30px; border: none; cursor: pointer; background: transparent;">
        </div>

        <div id="status" style="width: 100%; text-align: center; font-size: 11px; color: #888; margin-top: 5px;">Ready</div>
    </div>

    <!-- Editor Surface -->
    <div id="editor" contenteditable="true" spellcheck="true" style="width: 90%; max-width: 800px; min-height: 70vh; margin: 20px 0; padding: 20px; background: #ffffff; border-radius: 8px; border: 1px solid #ddd; outline: none; line-height: 1.6; font-size: 16px; overflow-wrap: break-word; box-sizing: border-box;">Start typing your notes...</div>

    <script>
        const editor = document.getElementById('editor');
        const status = document.getElementById('status');
        const body = document.getElementById('body');
        const controls = document.getElementById('controls');

        // Core Command Function
        function execCmd(command) {
            document.execCommand(command, false, null);
        }

        // Accent Color Change
        function changeAccent(color) {
            const buttons = document.querySelectorAll('button');
            status.style.color = color;
            localStorage.setItem('accent-pref', color);
        }

        // Dark Mode Logic
        function toggleDarkMode() {
            const isDark = body.style.backgroundColor === 'rgb(18, 18, 18)';
            if (!isDark) {
                body.style.backgroundColor = '#121212';
                body.style.color = '#e0e0e0';
                controls.style.backgroundColor = '#1e1e1e';
                controls.style.borderColor = '#333';
                editor.style.backgroundColor = '#1e1e1e';
                editor.style.borderColor = '#333';
                document.getElementById('themeBtn').innerText = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                body.style.backgroundColor = '#f0f2f5';
                body.style.color = '#1a1a1a';
                controls.style.backgroundColor = '#ffffff';
                controls.style.borderColor = '#ddd';
                editor.style.backgroundColor = '#ffffff';
                editor.style.borderColor = '#ddd';
                document.getElementById('themeBtn').innerText = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        // Autosave
        editor.addEventListener('input', () => {
            localStorage.setItem('mobile-note-content', editor.innerHTML);
            const now = new Date();
            status.innerText = `Saved: ${now.toLocaleTimeString()}`;
        });

        // Initialize
        window.onload = () => {
            const saved = localStorage.getItem('mobile-note-content');
            if (saved) editor.innerHTML = saved;
            
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
            
            const accent = localStorage.getItem('accent-pref');
            if (accent) {
                document.getElementById('colorPicker').value = accent;
                changeAccent(accent);
            }
        };

        // Download
        function downloadFile() {
            const text = editor.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my-note.txt';
            a.click();
        }
    </script>
</body>
</html>
